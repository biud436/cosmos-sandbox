<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmos — Particle Sandbox</title>
    <style>
      :root {
        --bg: #1e1e1e;
        --panel: #2b2b2b;
        --panel-hi: #383838;
        --border: #1a1a1a;
        --text: #c5c5c5;
        --text-dim: #8a8a8a;
        --accent: #5499f7;
        --accent-dim: #2f5a99;
        --warn: #ffb454;
        --ok: #7cd992;
      }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: var(--bg); color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 12px; overflow: hidden;
      }
      #shell {
        display: grid; height: 100vh; width: 100vw;
        grid-template-columns: 220px 1fr 340px;
        grid-template-rows: 40px 1fr 160px;
        grid-template-areas:
          "toolbar toolbar toolbar"
          "left    center  right"
          "bottom  bottom  bottom";
        gap: 1px; background: var(--border);
      }
      .panel {
        background: var(--panel); display: flex; flex-direction: column;
        min-width: 0; min-height: 0;
      }
      .panel-header {
        padding: 6px 10px; background: var(--panel-hi);
        font-weight: 600; font-size: 11px; letter-spacing: 0.4px;
        text-transform: uppercase; color: var(--text-dim);
        border-bottom: 1px solid var(--border); user-select: none;
      }
      .panel-body { padding: 8px 10px; overflow: auto; flex: 1; }

      #toolbar { grid-area: toolbar; display: flex; flex-direction: row; align-items: center; gap: 8px; padding: 0 12px; }
      #toolbar .title { font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
      #toolbar .title .accent { color: var(--accent); }
      #toolbar .spacer { flex: 1; }
      #toolbar .pill {
        background: var(--panel-hi); border: 1px solid var(--border);
        padding: 4px 10px; border-radius: 4px; color: var(--text);
        display: inline-flex; align-items: center; gap: 6px;
      }
      #toolbar .pill b { color: var(--accent); }
      #toolbar button {
        background: var(--panel-hi); border: 1px solid var(--border);
        color: var(--text); padding: 4px 12px; border-radius: 4px; cursor: pointer;
        font-size: 12px;
      }
      #toolbar button:hover { background: var(--accent-dim); }
      #toolbar select {
        background: var(--panel-hi); border: 1px solid var(--border);
        color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 12px;
      }

      #left   { grid-area: left;   }
      #center { grid-area: center; position: relative; background: #05060a; }
      #right  { grid-area: right;  }
      #bottom { grid-area: bottom; }

      #viewport { position: absolute; inset: 0; }
      #viewport canvas { display: block; }

      .hier-row {
        display: grid; grid-template-columns: 14px 1fr auto;
        align-items: center; gap: 8px;
        padding: 4px 6px; border-radius: 3px; cursor: default;
      }
      .hier-row + .hier-row { margin-top: 1px; }
      .hier-row:hover { background: var(--panel-hi); }
      .hier-dot { width: 10px; height: 10px; border-radius: 50%; }
      .hier-name { color: var(--text); }
      .hier-count { color: var(--text-dim); font-variant-numeric: tabular-nums; }

      #gui-host { display: flex; flex-direction: column; }
      #gui-host .lil-gui.root {
        --background-color: transparent;
        --widget-color: #1f1f1f;
        --hover-color: #2f5a99;
        --focus-color: #5499f7;
        --title-background-color: #383838;
        --title-text-color: #c5c5c5;
        --text-color: #c5c5c5;
        --number-color: #5499f7;
        --string-color: #7cd992;
        --font-size: 11.5px;
        --input-font-size: 11px;
        --padding: 5px;
        --spacing: 5px;
        --width: 100%;
        width: 100%; border-radius: 0;
      }

      .stats-grid {
        display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px 16px;
      }
      .stat { display: flex; flex-direction: column; }
      .stat .label { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
      .stat .value { color: var(--text); font-size: 14px; font-variant-numeric: tabular-nums; }
      .stat .value b { color: var(--accent); }
      .stat .value.warn b { color: var(--warn); }
      .stat .value.ok b { color: var(--ok); }

      .log {
        margin-top: 8px; max-height: 60px; overflow-y: auto;
        font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
        color: var(--text-dim); border-top: 1px solid var(--border); padding-top: 6px;
      }
      .log .ev { color: var(--warn); }

      .tools-body {
        padding: 10px;
        display: flex; flex-direction: row; flex-wrap: wrap; gap: 8px;
        border-bottom: 1px solid var(--border);
      }
      .tool-btn {
        display: flex; flex-direction: column; align-items: center; gap: 5px;
        padding: 8px 6px; width: 78px;
        border: 1px solid var(--border); border-radius: 6px;
        background: linear-gradient(180deg, #2a2a32, #1c1c22);
        cursor: grab; user-select: none;
        transition: transform 0.08s ease, background 0.1s, box-shadow 0.15s;
      }
      .tool-btn:hover {
        background: linear-gradient(180deg, #353540, #20202a);
        transform: translateY(-1px);
        box-shadow: 0 0 16px rgba(255, 140, 60, 0.35), inset 0 0 0 1px rgba(255,140,60,0.3);
      }
      .tool-btn:active { cursor: grabbing; }
      .tool-btn.dragging { opacity: 0.4; }
      .tool-canvas { display: block; }
      .tool-label {
        font-size: 10.5px; color: var(--text); letter-spacing: 0.3px;
      }
      .tool-action {
        background: var(--panel-hi); border: 1px solid var(--border);
        color: var(--text); border-radius: 4px; font-size: 11px;
        padding: 4px 10px; cursor: pointer; align-self: center;
      }
      .tool-action:hover { background: var(--accent-dim); }
      .tool-ghost {
        position: fixed; pointer-events: none; z-index: 9999;
        width: 64px; height: 64px;
        transform: translate(-50%, -50%);
        filter: drop-shadow(0 0 12px rgba(255, 140, 60, 0.6));
      }
      #viewport.drop-target::after {
        content: ''; position: absolute; inset: 8px;
        border: 2px dashed rgba(255, 160, 80, 0.5);
        border-radius: 8px; pointer-events: none;
      }

      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
    </style>
  </head>
  <body>
    <div id="shell">
      <div id="toolbar" class="panel">
        <span class="title">COSMOS<span class="accent"> · sandbox</span></span>
        <button id="btn-pause" title="시간 정지/재개 (Space)">⏸ Pause</button>
        <button id="btn-step" title="일시정지 상태에서 1틱 전진" disabled>⏭ Step</button>
        <button id="btn-reset" title="현재 분포로 재시작">↺ Reset</button>
        <label class="pill" title="시간 흐름 속도">⏱
          <select id="time-scale">
            <option value="0.25">×0.25</option>
            <option value="0.5">×0.5</option>
            <option value="1" selected>×1</option>
            <option value="2">×2</option>
            <option value="4">×4</option>
            <option value="8">×8</option>
          </select>
        </label>
        <label class="pill">Preset
          <select id="preset-select"></select>
        </label>
        <span class="spacer"></span>
        <span class="pill" title="흐른 우주 시간 (프리셋별 환산)">우주시간 <b id="hud-time">0 년</b></span>
        <span class="pill">FPS <b id="hud-fps">—</b></span>
        <span class="pill">N <b id="hud-n">—</b></span>
        <span class="pill">T <b id="hud-t">—</b> K</span>
      </div>

      <div id="left" class="panel">
        <div class="panel-header">Tools</div>
        <div class="tools-body" id="tools-body">
          <div class="tool-btn" id="tool-blackhole" title="드래그하여 블랙홀 배치">
            <canvas class="tool-canvas" width="56" height="56"></canvas>
            <span class="tool-label">Black Hole</span>
          </div>
          <button class="tool-action" id="tool-clear-bh" title="모든 블랙홀 제거">Clear</button>
        </div>
        <div class="panel-header">Hierarchy</div>
        <div class="panel-body" id="hier-body"></div>
      </div>

      <div id="center" class="panel">
        <div id="viewport"></div>
      </div>

      <div id="right" class="panel">
        <div class="panel-header">Inspector</div>
        <div class="panel-body" id="gui-host"></div>
      </div>

      <div id="bottom" class="panel">
        <div class="panel-header">Console · Statistics</div>
        <div class="panel-body">
          <div class="stats-grid">
            <div class="stat"><span class="label">우주시간</span><span class="value ok"><b id="s-time">0 년</b></span></div>
            <div class="stat"><span class="label">Time scale</span><span class="value"><b id="s-scale">×1</b></span></div>
            <div class="stat"><span class="label">T target</span><span class="value"><b id="s-ttarget">—</b> K</span></div>
            <div class="stat"><span class="label">T measured</span><span class="value"><b id="s-tmeas">—</b> K</span></div>
            <div class="stat"><span class="label">Particles</span><span class="value"><b id="s-n">—</b></span></div>
            <div class="stat"><span class="label">Kinetic E</span><span class="value"><b id="s-ke">—</b></span></div>
            <div class="stat"><span class="label">Potential E</span><span class="value"><b id="s-pe">—</b></span></div>
            <div class="stat"><span class="label">Bonds</span><span class="value"><b id="s-bonds">0</b></span></div>
            <div class="stat"><span class="label">Black holes</span><span class="value"><b id="s-bh">0</b></span></div>
            <div class="stat"><span class="label">Fusion events</span><span class="value warn"><b id="s-fus">0</b></span></div>
          </div>
          <div class="log" id="event-log"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
